<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        /* Top Banner */
        .banner {
            background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216') no-repeat center/cover;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .banner h1 {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .container {
            max-width: 1000px;
            margin: -50px auto 50px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        p {
            text-align: center;
            color: #555;
        }

        .contact-wrapper {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .contact-info {
            flex: 1;
        }

        .contact-info img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .contact-info p {
            text-align: left;
        }

        .contact-form {
            flex: 1;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .contact-form textarea {
            height: 120px;
        }

        .contact-form button {
            padding: 12px;
            border: none;
            background: linear-gradient(45deg, #007BFF, #00c6ff);
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-form button:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #777;
        }

        @media (max-width: 768px) {
            .contact-wrapper {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- Banner Section -->
<div class="banner">
    <h1>Contact Us</h1>
</div>

<div class="container">
    <p>We’d love to hear from you. Reach out anytime!</p>

    <div class="contact-wrapper">

        <!-- Contact Info -->
        <div class="contact-info">
            <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" alt="Office Image">
            <p><strong>Email:</strong> kssksourabh97@gmail.com</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Address:</strong> Patna, Bihar, India</p>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

    </div>

    <footer>
        © 2026 Your Company. All rights reserved.
    </footer>
</div>

</body>
</html>
